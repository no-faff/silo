name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  analyse:
    name: Analyse
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
